<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Texno Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --red:#D0021B;--blue:#1565C0;--dark:#0D47A1;
  --bg:#F4F6FB;--white:#fff;--text:#111;--muted:#6B7280;
  --border:#E5E7EB;--green:#10B981;--yellow:#F59E0B;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── LOGIN ── */
#loginScreen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0a0a18 0%,#0d1a3a 50%,#1a0a0a 100%);
  position:relative;overflow:hidden;
}
#loginScreen::before{
  content:'';position:absolute;top:-100px;right:-100px;
  width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(21,101,192,.25) 0%,transparent 65%);
}
#loginScreen::after{
  content:'';position:absolute;bottom:-80px;left:-80px;
  width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(208,2,27,.18) 0%,transparent 65%);
}
.login-box{
  background:rgba(255,255,255,.06);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.12);
  border-radius:24px;padding:44px 40px;width:380px;
  position:relative;z-index:1;
}
.login-logo{
  display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center;
}
.login-logo-icon{
  width:48px;height:48px;border-radius:14px;
  background:linear-gradient(135deg,#D0021B,#1565C0);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;color:#fff;font-size:1rem;letter-spacing:-1px;
}
.login-logo span{font-size:1.15rem;font-weight:800;color:#fff}
.login-box h2{font-size:1.1rem;font-weight:700;color:rgba(255,255,255,.7);text-align:center;margin-bottom:28px}
.login-input{
  width:100%;padding:13px 16px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);
  border-radius:11px;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:.9rem;color:#fff;outline:none;margin-bottom:12px;
  transition:border-color .2s;
}
.login-input::placeholder{color:rgba(255,255,255,.3)}
.login-input:focus{border-color:rgba(255,255,255,.35)}
.login-btn{
  width:100%;background:var(--red);color:#fff;border:none;
  padding:13px;border-radius:11px;font-family:'Plus Jakarta Sans',sans-serif;
  font-weight:800;font-size:.92rem;cursor:pointer;margin-top:4px;
  transition:all .2s;
}
.login-btn:hover{background:#b00018}
.login-err{
  color:#FF6B8A;font-size:.78rem;text-align:center;
  margin-top:10px;display:none;
}

/* ── ADMIN LAYOUT ── */
#adminScreen{display:none}
.admin-topbar{
  background:#fff;border-bottom:1px solid var(--border);
  height:64px;display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;position:sticky;top:0;z-index:100;
  box-shadow:0 1px 8px rgba(0,0,0,.05);
}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar-logo{
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,#D0021B,#1565C0);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;color:#fff;font-size:.78rem;
}
.topbar-left h1{font-size:1rem;font-weight:800;color:var(--text)}
.topbar-left span{font-size:.75rem;color:var(--muted);margin-left:4px;font-weight:500}
.topbar-right{display:flex;align-items:center;gap:10px}
.refresh-btn{
  background:var(--bg);border:1.5px solid var(--border);
  padding:8px 14px;border-radius:9px;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:.78rem;font-weight:700;cursor:pointer;color:var(--muted);
  display:flex;align-items:center;gap:6px;transition:all .2s;
}
.refresh-btn:hover{background:#eee;color:var(--text)}
.logout-btn{
  background:rgba(208,2,27,.08);color:var(--red);border:1.5px solid rgba(208,2,27,.18);
  padding:8px 14px;border-radius:9px;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:.78rem;font-weight:700;cursor:pointer;transition:all .2s;
}
.logout-btn:hover{background:rgba(208,2,27,.14)}

/* ── MAIN ── */
.admin-main{padding:28px;max-width:1300px;margin:0 auto}

/* stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-box{
  background:#fff;border:1.5px solid var(--border);border-radius:16px;
  padding:20px 22px;transition:box-shadow .2s;
}
.stat-box:hover{box-shadow:0 4px 16px rgba(0,0,0,.06)}
.stat-label{font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.stat-val{font-size:2rem;font-weight:800;letter-spacing:-1.5px;line-height:1}
.stat-sub{font-size:.72rem;color:var(--muted);margin-top:4px}

/* filters */
.filters{
  display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center;
}
.filter-select{
  padding:9px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;font-weight:600;
  color:var(--text);background:#fff;outline:none;cursor:pointer;
  transition:border-color .2s;
}
.filter-select:focus{border-color:var(--blue)}
.search-inp{
  padding:9px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;
  color:var(--text);background:#fff;outline:none;min-width:220px;
  transition:border-color .2s;
}
.search-inp:focus{border-color:var(--blue)}
.filter-count{
  margin-left:auto;font-size:.78rem;font-weight:600;color:var(--muted);
}
.export-btn{
  background:var(--blue);color:#fff;border:none;
  padding:9px 16px;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:.78rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:background .2s;
}
.export-btn:hover{background:var(--dark)}

/* table */
.table-wrap{
  background:#fff;border:1.5px solid var(--border);border-radius:18px;
  overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.04);
}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{
  background:var(--bg);padding:12px 16px;text-align:left;
  font-size:.7rem;font-weight:700;color:var(--muted);
  letter-spacing:.8px;text-transform:uppercase;
  border-bottom:1.5px solid var(--border);white-space:nowrap;
}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#FAFBFF}
tbody td{padding:13px 16px;font-size:.84rem;vertical-align:middle}
.td-id{font-size:.72rem;color:var(--muted);font-family:monospace}
.td-name{font-weight:700;color:var(--text)}
.td-phone a{color:var(--blue);text-decoration:none;font-weight:600}
.td-phone a:hover{text-decoration:underline}
.td-date{font-size:.75rem;color:var(--muted);white-space:nowrap}
.badge{
  display:inline-block;padding:3px 10px;border-radius:100px;
  font-size:.68rem;font-weight:700;white-space:nowrap;
}
.badge-cel{background:rgba(208,2,27,.08);color:#D0021B}
.badge-goy{background:rgba(21,101,192,.08);color:#1565C0}
.badge-mas{background:rgba(13,71,161,.08);color:#0D47A1}
.badge-kurs{background:rgba(16,185,129,.08);color:#059669;font-size:.65rem}
.td-msg{font-size:.78rem;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wa-link{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(37,211,102,.1);color:#1a9e4a;
  padding:5px 10px;border-radius:7px;font-size:.72rem;font-weight:700;
  text-decoration:none;transition:background .2s;white-space:nowrap;
}
.wa-link:hover{background:rgba(37,211,102,.2)}

/* empty */
.empty-state{
  padding:60px 20px;text-align:center;
}
.empty-icon{font-size:2.5rem;margin-bottom:12px}
.empty-state p{color:var(--muted);font-size:.88rem}

/* loading */
.loading{
  padding:48px;text-align:center;color:var(--muted);font-size:.88rem;
}
.spinner{
  width:32px;height:32px;border:3px solid var(--border);
  border-top-color:var(--red);border-radius:50%;
  animation:spin .7s linear infinite;margin:0 auto 12px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* toast */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:9999;
  background:#111;color:#fff;padding:12px 18px;border-radius:10px;
  font-size:.82rem;font-weight:600;
  transform:translateY(20px);opacity:0;transition:all .3s;pointer-events:none;
}
.toast.show{transform:translateY(0);opacity:1}

@media(max-width:768px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .admin-topbar{padding:0 16px}
  .admin-main{padding:16px}
  .filter-count,.export-btn{display:none}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">TX</div>
      <span>Texno Admin</span>
    </div>
    <h2>Admin panelinə giriş</h2>
    <input class="login-input" type="text" id="loginUser" placeholder="İstifadəçi adı" autocomplete="username">
    <input class="login-input" type="password" id="loginPass" placeholder="Şifrə" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Daxil ol →</button>
    <div class="login-err" id="loginErr">İstifadəçi adı və ya şifrə yanlışdır.</div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen">
  <header class="admin-topbar">
    <div class="topbar-left">
      <div class="topbar-logo">TX</div>
      <h1>Admin Panel <span>· Texno Tədris Mərkəzi</span></h1>
    </div>
    <div class="topbar-right">
      <button class="refresh-btn" onclick="loadData()">↻ Yenilə</button>
      <button class="export-btn" onclick="exportCSV()">⬇ Excel</button>
      <button class="logout-btn" onclick="logout()">Çıxış</button>
    </div>
  </header>

  <main class="admin-main">
    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-label">Cəmi Qeydiyyat</div>
        <div class="stat-val" id="statTotal" style="color:#111">—</div>
        <div class="stat-sub">bütün filiallar</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Bu Həftə</div>
        <div class="stat-val" id="statWeek" style="color:#1565C0">—</div>
        <div class="stat-sub">son 7 gün</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Bu Gün</div>
        <div class="stat-val" id="statToday" style="color:#D0021B">—</div>
        <div class="stat-sub" id="statTodayDate">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Ən Çox Seçilən</div>
        <div class="stat-val" id="statTopKurs" style="font-size:1rem;padding-top:6px;color:#059669">—</div>
        <div class="stat-sub">populyar kurs</div>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="filters">
      <input class="search-inp" type="text" id="searchInp" placeholder="🔍 Ad, telefon axtar..." oninput="applyFilters()">
      <select class="filter-select" id="filterFilial" onchange="applyFilters()">
        <option value="">Bütün Filiallar</option>
        <option>Cəlilabad</option>
        <option>Göytəpə</option>
        <option>Masallı</option>
      </select>
      <select class="filter-select" id="filterKurs" onchange="applyFilters()">
        <option value="">Bütün Kurslar</option>
        <option>İbtidai Sinif (150 ₼)</option>
        <option>Təkmilləşdirmə (130 ₼)</option>
        <option>9-cu Sinif Buraxılış (150 ₼)</option>
        <option>Abituriyent (200 ₼)</option>
        <option>11-ci Sinif Buraxılış (160 ₼)</option>
        <option>11-ci + Abituriyent (210 ₼)</option>
      </select>
      <span class="filter-count" id="filterCount"></span>
      <button class="export-btn" onclick="exportCSV()">⬇ Excel yüklə</button>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Ad Soyad</th>
              <th>Telefon</th>
              <th>Filial</th>
              <th>Kurs</th>
              <th>Mesaj</th>
              <th>Tarix</th>
              <th>Əlaqə</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="8"><div class="loading"><div class="spinner"></div>Yüklənir...</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL = 'https://umgthrzzlzwqtkaumyne.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVtZ3Rocnp6bHp3cXRrYXVteW5lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NDkyMDIsImV4cCI6MjA5MzAyNTIwMn0.D_XJ5TAuYr9ddXRYwn-qpIfiBHyf1dVrRknglsWI5ls';

// Simple credentials — change these!
const ADMIN_USER = 'texno';
const ADMIN_PASS = 'texno2025';

let allData = [];

// ── LOGIN ──
function doLogin(){
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if(u === ADMIN_USER && p === ADMIN_PASS){
    sessionStorage.setItem('tx_admin','1');
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('adminScreen').style.display='block';
    loadData();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('loginPass').value='';
  }
}

function logout(){
  sessionStorage.removeItem('tx_admin');
  location.reload();
}

// Auto-login if session exists
if(sessionStorage.getItem('tx_admin')==='1'){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('adminScreen').style.display='block';
}

// ── LOAD DATA ──
async function loadData(){
  document.getElementById('tableBody').innerHTML=
    '<tr><td colspan="8"><div class="loading"><div class="spinner"></div>Yüklənir...</div></td></tr>';
  try {
    const res = await fetch(`${SB_URL}/rest/v1/qeydiyyat?select=*&order=created_at.desc`, {
      headers:{ 'apikey': SB_KEY, 'Authorization': 'Bearer '+SB_KEY }
    });
    if(!res.ok) throw new Error(res.status);
    allData = await res.json();
    updateStats(allData);
    applyFilters();
    showToast(`✅ ${allData.length} qeydiyyat yükləndi`);
  } catch(e){
    document.getElementById('tableBody').innerHTML=
      `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">⚠️</div><p>Xəta baş verdi: ${e.message}</p></div></td></tr>`;
  }
}

// ── STATS ──
function updateStats(data){
  document.getElementById('statTotal').textContent = data.length;
  const now = new Date();
  const today = now.toDateString();
  const week = new Date(now - 7*24*60*60*1000);
  const todayCount = data.filter(r=>new Date(r.created_at).toDateString()===today).length;
  const weekCount = data.filter(r=>new Date(r.created_at)>=week).length;
  document.getElementById('statToday').textContent = todayCount;
  document.getElementById('statTodayDate').textContent = now.toLocaleDateString('az-AZ');
  document.getElementById('statWeek').textContent = weekCount;
  // top kurs
  const kursCount={};
  data.forEach(r=>{ kursCount[r.kurs]=(kursCount[r.kurs]||0)+1 });
  const topKurs = Object.entries(kursCount).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('statTopKurs').textContent = topKurs
    ? topKurs[0].split(' ')[0]+' '+topKurs[0].split(' ')[1]
    : '—';
}

// ── FILTERS ──
function applyFilters(){
  const q = document.getElementById('searchInp').value.toLowerCase();
  const f = document.getElementById('filterFilial').value;
  const k = document.getElementById('filterKurs').value;
  const filtered = allData.filter(r=>{
    const matchQ = !q || r.ad_soyad.toLowerCase().includes(q) || r.telefon.includes(q);
    const matchF = !f || r.filial === f;
    const matchK = !k || r.kurs === k;
    return matchQ && matchF && matchK;
  });
  document.getElementById('filterCount').textContent = `${filtered.length} nəticə`;
  renderTable(filtered);
}

// ── RENDER ──
function renderTable(data){
  if(!data.length){
    document.getElementById('tableBody').innerHTML=
      '<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">📭</div><p>Qeydiyyat tapılmadı</p></div></td></tr>';
    return;
  }
  const badgeClass = f => f==='Cəlilabad'?'badge-cel':f==='Göytəpə'?'badge-goy':'badge-mas';
  document.getElementById('tableBody').innerHTML = data.map((r,i)=>{
    const d = new Date(r.created_at);
    const dateStr = d.toLocaleDateString('az-AZ') + ' ' + d.toLocaleTimeString('az-AZ',{hour:'2-digit',minute:'2-digit'});
    const phone = r.telefon.replace(/\s/g,'');
    const waNum = phone.startsWith('+')? phone.slice(1) : phone.startsWith('0')? '994'+phone.slice(1) : phone;
    const waMsg = encodeURIComponent(`Salam ${r.ad_soyad}! Texno Tədris Mərkəzindən zəng edirik. ${r.kurs} kursu haqqında məlumat vermək istəyirik.`);
    return `<tr>
      <td class="td-id">${data.length - i}</td>
      <td class="td-name">${esc(r.ad_soyad)}</td>
      <td class="td-phone"><a href="tel:${esc(r.telefon)}">${esc(r.telefon)}</a></td>
      <td><span class="badge ${badgeClass(r.filial)}">${esc(r.filial)}</span></td>
      <td><span class="badge badge-kurs">${esc(r.kurs)}</span></td>
      <td class="td-msg" title="${esc(r.mesaj||'')}">${esc(r.mesaj||'—')}</td>
      <td class="td-date">${dateStr}</td>
      <td>
        <a class="wa-link" href="https://wa.me/${waNum}?text=${waMsg}" target="_blank">
          <svg width="12" height="12" viewBox="0 0 32 32" fill="currentColor"><path d="M16 0C7.164 0 0 7.163 0 16c0 2.822.736 5.477 2.027 7.785L0 32l8.457-2.001A15.938 15.938 0 0016 32c8.836 0 16-7.163 16-16S24.836 0 16 0zm7.274 19.453c-.398-.2-2.356-1.163-2.721-1.296-.365-.133-.631-.2-.897.2-.266.4-1.03 1.296-1.264 1.563-.232.267-.464.3-.862.1-.398-.2-1.682-.62-3.203-1.977-1.183-1.056-1.983-2.36-2.216-2.758-.232-.398-.025-.614.175-.812.18-.178.398-.464.597-.696.2-.232.266-.398.4-.664.133-.266.066-.5-.034-.696-.1-.2-.897-2.163-1.23-2.96-.323-.779-.65-.673-.897-.685l-.763-.013c-.266 0-.697.1-1.063.498-.365.398-1.395 1.363-1.395 3.326s1.429 3.858 1.628 4.124c.2.266 2.814 4.296 6.819 6.025.953.412 1.696.658 2.275.842.956.305 1.826.262 2.515.159.767-.114 2.356-.963 2.688-1.894.332-.93.332-1.73.232-1.895-.1-.164-.366-.264-.764-.464z"/></svg>
          WhatsApp
        </a>
      </td>
    </tr>`;
  }).join('');
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

// ── EXPORT EXCEL ──
function exportCSV(){
  if(!allData.length){ showToast('⚠️ Data yoxdur'); return; }
  const headers = ['№','Ad Soyad','Telefon','Filial','Kurs','Mesaj','Tarix'];
  const rows = allData.map((r,i)=>[
    allData.length-i, r.ad_soyad, r.telefon, r.filial, r.kurs,
    r.mesaj||'', new Date(r.created_at).toLocaleString('az-AZ')
  ]);

  // Build Excel XML (SpreadsheetML)
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const cell = (v, bold=false) => {
    const style = bold ? ' ss:StyleID="header"' : '';
    return `<Cell${style}><Data ss:Type="String">${esc(v)}</Data></Cell>`;
  };
  const headerRow = `<Row>${headers.map(h=>cell(h,true)).join('')}</Row>`;
  const dataRows = rows.map(r=>`<Row>${r.map(v=>cell(v)).join('')}</Row>`).join('');

  const xml = `<?xml version="1.0" encoding="UTF-8"?>
<?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"
 xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">
 <Styles>
  <Style ss:ID="header">
   <Font ss:Bold="1"/>
   <Interior ss:Color="#D0021B" ss:Pattern="Solid"/>
   <Font ss:Bold="1" ss:Color="#FFFFFF"/>
  </Style>
 </Styles>
 <Worksheet ss:Name="Qeydiyyat">
  <Table>
   ${headerRow}
   ${dataRows}
  </Table>
 </Worksheet>
</Workbook>`;

  const blob = new Blob([xml], {type:'application/vnd.ms-excel;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `texno_qeydiyyat_${new Date().toISOString().slice(0,10)}.xls`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('⬇ Excel faylı yükləndi');
}

// ── TOAST ──
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

if(sessionStorage.getItem('tx_admin')==='1') loadData();

// Enter key on login
document.getElementById('loginUser')?.addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin() });
